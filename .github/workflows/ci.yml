---
name: "CI"

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # ================================================================
  # 1. YAML SYNTAX VALIDATION
  # ----------------------------------------------------------------
  # Validates all workflow definitions for correct YAML syntax
  # using yamllint with project-specific configuration.
  # ================================================================
  yaml-lint:
    name: "YAML Lint"
    runs-on: ubuntu-latest
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Install yamllint"
        run: pip install yamllint

      - name: "Lint workflow files"
        run: yamllint .github/workflows/*.yml

  # ================================================================
  # 2. GITHUB ACTIONS SCHEMA VALIDATION
  # ----------------------------------------------------------------
  # Validates GitHub Actions-specific syntax (expressions, action
  # references, workflow_call schemas). Runs with continue-on-error
  # since actionlint cannot fully resolve workflow_call input types
  # from caller context.
  # ================================================================
  actions-lint:
    name: "Actions Lint"
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: "Checkout repository"
        uses: actions/checkout@v6

      - name: "Run actionlint"
        uses: raven-actions/actionlint@v2

  # ================================================================
  # 3. MERGE CHECK — Single mandatory gate for PR merges
  # ----------------------------------------------------------------
  # Aggregates all validation results into a single status check.
  # Configure this as the sole required check in branch protection
  # rules to avoid updating rules when jobs are added or removed.
  # ================================================================
  merge-check:
    name: "Merge Check"
    needs: [yaml-lint, actions-lint]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "Evaluate results"
        run: |
          if [[ "${{ needs.yaml-lint.result }}" != "success" ]]; then
            echo "::error::YAML lint failed"
            exit 1
          fi
          echo "All validations passed"
